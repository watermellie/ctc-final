<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive 3D Model</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0; /* Light gray background */
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            /* Removes the default blue focus outline */
            --poster-color: transparent; 
        }
    </style>
</head>
<body>

    <model-viewer 
        src="assets/model.glb" 
        alt="A 3D model" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
